info:
  title: roborev
  version: dev
openapi: 3.1.0
paths:
  /api/activity:
    get:
      operationId: list-activity
      parameters:
        - description: Maximum entries to return
          explode: false
          in: query
          name: limit
          schema:
            description: Maximum entries to return
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List recent daemon activity
      tags:
        - daemon
  /api/branches:
    get:
      operationId: list-branches
      parameters:
        - description: Filter to branches in these repo paths
          explode: true
          in: query
          name: repo
          schema:
            description: Filter to branches in these repo paths
            items:
              type: string
            type:
              - array
              - "null"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBranchesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List branches with job counts
      tags:
        - repos
  /api/comment:
    post:
      operationId: add-comment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Add a comment to a job or commit
      tags:
        - comments
  /api/comments:
    get:
      operationId: list-comments
      parameters:
        - description: List comments by job ID
          explode: false
          in: query
          name: job_id
          schema:
            default: -1
            description: List comments by job ID
            format: int64
            type: integer
        - description: List comments by commit ID
          explode: false
          in: query
          name: commit_id
          schema:
            default: -1
            description: List comments by commit ID
            format: int64
            type: integer
        - description: List comments by commit SHA
          explode: false
          in: query
          name: sha
          schema:
            description: List comments by commit SHA
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCommentsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List comments for a job or commit
      tags:
        - comments
  /api/cost:
    get:
      operationId: get-cost
      parameters:
        - description: Repo root paths (repeatable)
          explode: true
          in: query
          name: repo
          schema:
            description: Repo root paths (repeatable)
            items:
              type: string
            type:
              - array
              - "null"
        - description: Filter by branch name
          explode: false
          in: query
          name: branch
          schema:
            description: Filter by branch name
            type: string
        - description: Only jobs with empty/unset branch
          explode: false
          in: query
          name: branch_empty
          schema:
            description: Only jobs with empty/unset branch
            enum:
              - "true"
              - "false"
            type: string
        - description: Time window (e.g. 7d); default all-time
          explode: false
          in: query
          name: since
          schema:
            description: Time window (e.g. 7d); default all-time
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostAggregate"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get aggregate review cost
      tags:
        - daemon
  /api/enqueue:
    post:
      operationId: enqueue-job
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ReviewJob"
                  - $ref: "#/components/schemas/EnqueueSkippedResponse"
        "201":
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ReviewJob"
                  - $ref: "#/components/schemas/EnqueueSkippedResponse"
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      summary: Enqueue a daemon job
      tags:
        - jobs
  /api/export/reviews:
    get:
      operationId: export-reviews
      parameters:
        - description: Output format; only json is supported
          explode: false
          in: query
          name: format
          schema:
            default: json
            description: Output format; only json is supported
            type: string
        - description: "Export profile: content or metadata"
          explode: false
          in: query
          name: profile
          schema:
            default: content
            description: "Export profile: content or metadata"
            type: string
        - description: Inclusive completed_at lower bound (RFC3339 or YYYY-MM-DD)
          explode: false
          in: query
          name: since
          schema:
            description: Inclusive completed_at lower bound (RFC3339 or YYYY-MM-DD)
            type: string
        - description: Exclusive completed_at upper bound (RFC3339 or YYYY-MM-DD; date-only means through that UTC day)
          explode: false
          in: query
          name: until
          schema:
            description: Exclusive completed_at upper bound (RFC3339 or YYYY-MM-DD; date-only means through that UTC day)
            type: string
        - description: Only include reviews marked closed
          explode: false
          in: query
          name: closed_only
          schema:
            description: Only include reviews marked closed
            type: boolean
        - description: Exact exported repo identifier filter
          explode: false
          in: query
          name: repo
          schema:
            description: Exact exported repo identifier filter
            type: string
        - description: Exact project display-name filter
          explode: false
          in: query
          name: project
          schema:
            description: Exact project display-name filter
            type: string
        - description: Maximum top-level reviews in this page
          explode: false
          in: query
          name: limit
          schema:
            default: 500
            description: Maximum top-level reviews in this page
            format: int64
            type: integer
        - description: Opaque next_cursor from a previous page. Resumes strictly after its (completed_at, review_id) position; mutually exclusive with since.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque next_cursor from a previous page. Resumes strictly after its (completed_at, review_id) position; mutually exclusive with since.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportReviewsDocument"
          description: OK
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Cursor database_id does not match this local database
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Export completed reviews
      tags:
        - reviews
  /api/health:
    get:
      operationId: get-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get daemon health
      tags:
        - daemon
  /api/job/applied:
    post:
      operationId: mark-job-applied
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobIDRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Mark a fix job as applied
      tags:
        - jobs
  /api/job/cancel:
    post:
      operationId: cancel-job
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelJobRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Cancel a queued or running job
      tags:
        - jobs
  /api/job/fix:
    post:
      operationId: create-fix-job
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixJobRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewJob"
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      summary: Create a background fix job
      tags:
        - jobs
  /api/job/log:
    get:
      operationId: get-job-log
      parameters:
        - description: Job ID
          explode: false
          in: query
          name: job_id
          schema:
            description: Job ID
            type: string
        - description: Byte offset into the log file
          explode: false
          in: query
          name: offset
          schema:
            description: Byte offset into the log file
            type: string
      responses:
        "200":
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get raw job log bytes
      tags:
        - jobs
  /api/job/output:
    get:
      operationId: get-job-output
      parameters:
        - description: Job ID
          explode: false
          in: query
          name: job_id
          schema:
            description: Job ID
            type: string
        - description: Stream output as NDJSON when set to 1
          explode: false
          in: query
          name: stream
          schema:
            description: Stream output as NDJSON when set to 1
            type: string
      responses:
        "200":
          description: OK
        default:
          content:
