minimum_prek_version = "0.3.6"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "git-test-isolation"
name = "git test isolation"
language = "system"
entry = "make test-git-isolation"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "golangci-lint"
name = "golangci-lint"
language = "system"
entry = "make lint"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "renovate-config-validator"
name = "renovate config validator"
language = "system"
entry = "make check-renovate-config"
files = "^renovate\\.json$"
pass_filenames = false
