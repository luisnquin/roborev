[project]
site_name = "roborev"
site_url = "https://roborev.io"
site_description = "Continuous code review for coding agents"
site_author = "Kenn Software LLC"
copyright = 'Copyright &copy; 2026 <a href="https://kenn.io">Kenn Software LLC</a>. MIT License.'
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/kenn-io/roborev"
repo_name = "kenn-io/roborev"
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/lightbox.js"]
use_directory_urls = true
nav = [
  {"Quick Start" = "quickstart.md"},
  {"Installation" = "installation.md"},
  {"Automation" = [
    {"Post-Commit Reviews" = "automation/post-commit-reviews.md"},
    {"Agent Hook"          = "agent-hook.md"},
    {"Review Event Hooks"  = "guides/hooks.md"},
  ]},
  {"CLI Commands" = "commands.md"},
  {"Terminal UI" = "integrations/tui.md"},
  {"Configuration" = "configuration.md"},
  {"Supported Agents" = "agents/index.md"},
  {"GitHub Integration" = "integrations/github.md"},
  {"Guides" = [
    {"Reviewing Code" = "guides/reviewing-code.md"},
    {"Responding to Reviews" = "guides/responding-to-reviews.md"},
    {"Agent Skills" = "guides/agent-skills.md"},
    {"Code Analysis & Refactoring" = "guides/assisted-refactoring.md"},
    {"Auto-Fix with Refine" = "guides/auto-fixing.md"},
    {"Repository Management" = "guides/repository-management.md"},
  ]},
  {"Advanced Features" = [
    {"Background Tasks" = "advanced/background-tasks.md"},
    {"Subagent Review Panels" = "advanced/subagent-review-panels.md"},
    {"Custom Tasks & Agentic Mode" = "advanced/custom-tasks.md"},
    {"Agent Client Protocol (ACP)" = "advanced/acp.md"},
    {"PostgreSQL Sync" = "advanced/postgres-sync.md"},
    {"Streaming & Daemon API" = "advanced/streaming.md"},
  ]},
  {"Integrations" = [
    {"Kata" = "integrations/kata.md"},
    {"Claude Chic" = "integrations/claudechic.md"},
  ]},
  {"Troubleshooting" = "guides/troubleshooting.md"},
  {"Development" = "development.md"},
  {"Changelog" = "changelog.md"},
]

[project.extra]
homepage = "/"

[project.theme]
variant = "modern"
custom_dir = "overrides"
logo = "assets/static/logo.svg"
favicon = "assets/static/favicon.svg"
features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.sections",
  "navigation.path",
  "content.code.copy",
]

[project.theme.palette]
scheme = "slate"
primary = "custom"
accent = "custom"

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/file-code"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
